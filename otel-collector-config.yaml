receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s

exporters:
  file/perf:
    path: /artifacts/perf/otel.jsonl
    rotation:
      max_megabytes: 100
      max_backups: 1

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [file/perf]
