version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:20"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 10
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:40"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns: ["*"]
