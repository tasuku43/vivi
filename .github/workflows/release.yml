name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to build, for example v0.1.0"
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-arm64
            goos: darwin
            goarch: arm64
            artifact: vivi_Darwin_arm64.tar.gz
          - name: darwin-amd64
            goos: darwin
            goarch: amd64
            artifact: vivi_Darwin_x86_64.tar.gz
          - name: linux-arm64
            goos: linux
            goarch: arm64
            artifact: vivi_Linux_arm64.tar.gz
          - name: linux-amd64
            goos: linux
            goarch: amd64
            artifact: vivi_Linux_x86_64.tar.gz
    env:
      RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG || github.ref }}

      - name: Validate release tag
        shell: bash
        run: |
          if [[ -n "$RELEASE_TAG" && ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release_tag must match vMAJOR.MINOR.PATCH, for example v0.1.0" >&2
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - run: npm ci
      - run: npm run build
      - run: npm run prepare:go
      - run: go test ./...

      - name: Build vivi
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p "dist/release/${{ matrix.name }}"
          go build -trimpath -ldflags="-s -w" -o "dist/release/${{ matrix.name }}/vivi" ./cmd/vivi
          tar -C "dist/release/${{ matrix.name }}" -czf "dist/release/${{ matrix.artifact }}" vivi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/release/${{ matrix.artifact }}
          if-no-files-found: error

  checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: Generate checksums.txt
        shell: bash
        run: |
          cd dist/release
          sha256sum vivi_*.tar.gz > checksums.txt
          cat checksums.txt

      - uses: actions/upload-artifact@v4
        with:
          name: checksums.txt
          path: dist/release/checksums.txt
          if-no-files-found: error

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/release/vivi_*.tar.gz
            dist/release/checksums.txt

      - name: Create draft GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/release/vivi_*.tar.gz
            dist/release/checksums.txt
