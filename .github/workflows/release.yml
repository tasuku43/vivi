name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to build, for example v0.1.0"
        required: false
        type: string

permissions: read-all

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-arm64
            goos: darwin
            goarch: arm64
            artifact: vivi_Darwin_arm64.tar.gz
          - name: darwin-amd64
            goos: darwin
            goarch: amd64
            artifact: vivi_Darwin_x86_64.tar.gz
          - name: linux-arm64
            goos: linux
            goarch: arm64
            artifact: vivi_Linux_arm64.tar.gz
          - name: linux-amd64
            goos: linux
            goarch: amd64
            artifact: vivi_Linux_x86_64.tar.gz
    env:
      RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ env.RELEASE_TAG || github.ref }}

      - name: Validate release tag
        shell: bash
        run: |
          if [[ -n "$RELEASE_TAG" && ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release_tag must match vMAJOR.MINOR.PATCH, for example v0.1.0" >&2
            exit 1
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false

      - run: npm ci
      - run: npm run build
      - run: npm run prepare:go
      - run: go test ./...

      - name: Build vivi
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p "dist/release/${{ matrix.name }}"
          go build -trimpath -ldflags="-s -w -X main.version=${RELEASE_TAG:-0.0.0}" -o "dist/release/${{ matrix.name }}/vivi" ./cli
          tar -C "dist/release/${{ matrix.name }}" -czf "dist/release/${{ matrix.artifact }}" vivi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/release/${{ matrix.artifact }}
          if-no-files-found: error

  checksums:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist/release
          merge-multiple: true

      - name: Generate checksums.txt
        shell: bash
        run: |
          cd dist/release
          sha256sum vivi_*.tar.gz > checksums.txt
          cat checksums.txt

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: checksums.txt
          path: dist/release/checksums.txt
          if-no-files-found: error

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: |
            dist/release/vivi_*.tar.gz
            dist/release/checksums.txt

      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/release/vivi_*.tar.gz dist/release/checksums.txt --verify-tag --generate-notes

      - name: Determine release channel (stable only)
        if: github.event_name == 'push'
        id: channel
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "${tag}" == *-* ]]; then
            echo "stable=false" >>"${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "stable=true" >>"${GITHUB_OUTPUT}"

      - name: Create GitHub App token for Homebrew tap
        if: github.event_name == 'push' && steps.channel.outputs.stable == 'true'
        id: homebrew-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.HOMEBREW_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_APP_KEY }}
          owner: tasuku43
          repositories: homebrew-tap

      - name: Checkout Homebrew tap
        if: github.event_name == 'push' && steps.channel.outputs.stable == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: tasuku43/homebrew-tap
          token: ${{ steps.homebrew-token.outputs.token }}
          path: homebrew-tap

      - name: Update Homebrew formula
        if: github.event_name == 'push' && steps.channel.outputs.stable == 'true'
        working-directory: homebrew-tap
        run: |
          bash ../.github/scripts/update-homebrew-formula.sh "${GITHUB_REF_NAME}" "../dist/release/checksums.txt"

      - name: Create PR for Homebrew formula update
        if: github.event_name == 'push' && steps.channel.outputs.stable == 'true'
        env:
          GH_TOKEN: ${{ steps.homebrew-token.outputs.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        working-directory: homebrew-tap
        shell: bash
        run: |
          branch="chore/homebrew-formula-${RELEASE_TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]""@""users.noreply.github.com"
          git switch -c "${branch}"
          git add Formula/vivi.rb
          git commit -m "Update Homebrew formula for ${RELEASE_TAG}"
          git push origin "${branch}"
          gh pr create --repo tasuku43/homebrew-tap --base main --head "${branch}" --title "Update Homebrew formula for ${RELEASE_TAG}" --body "Updates Formula/vivi.rb to point to GitHub Releases artifacts for ${RELEASE_TAG}."
