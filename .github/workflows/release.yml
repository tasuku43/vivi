name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to build, for example v0.1.0"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-arm64
            goos: darwin
            goarch: arm64
            artifact: vivi_Darwin_arm64.tar.gz
          - name: darwin-amd64
            goos: darwin
            goarch: amd64
            artifact: vivi_Darwin_x86_64.tar.gz
          - name: linux-arm64
            goos: linux
            goarch: arm64
            artifact: vivi_Linux_arm64.tar.gz
          - name: linux-amd64
            goos: linux
            goarch: amd64
            artifact: vivi_Linux_x86_64.tar.gz
    env:
      RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG || github.ref }}

      - name: Validate release tag
        shell: bash
        run: |
          if [[ -n "$RELEASE_TAG" && ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release_tag must match vMAJOR.MINOR.PATCH, for example v0.1.0" >&2
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - run: npm ci
      - run: npm run build
      - run: npm run prepare:go
      - run: go test ./...

      - name: Build vivi
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p "dist/release/${{ matrix.name }}"
          go build -trimpath -ldflags="-s -w -X main.version=${RELEASE_TAG:-0.0.0}" -o "dist/release/${{ matrix.name }}/vivi" ./cmd/vivi
          tar -C "dist/release/${{ matrix.name }}" -czf "dist/release/${{ matrix.artifact }}" vivi

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/release/${{ matrix.artifact }}
          if-no-files-found: error

  checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          path: dist/release
          merge-multiple: true

      - name: Generate checksums.txt
        shell: bash
        run: |
          cd dist/release
          sha256sum vivi_*.tar.gz > checksums.txt
          cat checksums.txt

      - uses: actions/upload-artifact@v7
        with:
          name: checksums.txt
          path: dist/release/checksums.txt
          if-no-files-found: error

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/release/vivi_*.tar.gz
            dist/release/checksums.txt

      - name: Create draft GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/release/vivi_*.tar.gz
            dist/release/checksums.txt

      - name: Determine release channel (stable only)
        if: github.event_name == 'push'
        id: channel
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "${tag}" == *-* ]]; then
            echo "stable=false" >>"${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "stable=true" >>"${GITHUB_OUTPUT}"

      - name: Create GitHub App token for Homebrew tap
        if: github.event_name == 'push' && steps.channel.outputs.stable == 'true'
        id: homebrew-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HOMEBREW_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_APP_KEY }}
          owner: tasuku43
          repositories: homebrew-vivi

      - name: Checkout Homebrew tap
        if: github.event_name == 'push' && steps.channel.outputs.stable == 'true'
        uses: actions/checkout@v7
        with:
          repository: tasuku43/homebrew-vivi
          token: ${{ steps.homebrew-token.outputs.token }}
          path: homebrew-tap

      - name: Update Homebrew formula
        if: github.event_name == 'push' && steps.channel.outputs.stable == 'true'
        working-directory: homebrew-tap
        run: |
          bash ../.github/scripts/update-homebrew-formula.sh "${GITHUB_REF_NAME}" "../dist/release/checksums.txt"

      - name: Create PR for Homebrew formula update
        if: github.event_name == 'push' && steps.channel.outputs.stable == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.homebrew-token.outputs.token }}
          path: homebrew-tap
          commit-message: "Update Homebrew formula for ${{ github.ref_name }}"
          title: "Update Homebrew formula for ${{ github.ref_name }}"
          body: |
            Updates `Formula/vivi.rb` to point to GitHub Releases artifacts for `${{ github.ref_name }}`.
          add-paths: |
            Formula/vivi.rb
          base: main
          branch: "chore/homebrew-formula-${{ github.ref_name }}"
          delete-branch: true
