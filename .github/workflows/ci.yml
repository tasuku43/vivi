name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - uses: arduino/setup-task@v2
      - run: npm ci
      - run: task check
