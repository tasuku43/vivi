name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: read-all

jobs:
  check:
    runs-on: macos-15
    env:
      LANG: "en_US.UTF-8"
      LC_ALL: "en_US.UTF-8"
      TZ: "Asia/Tokyo"
      VIVI_STORYBOOK_SNAPSHOT_LOCALE: "en-US"
      VIVI_STORYBOOK_SNAPSHOT_TIMEZONE: "Asia/Tokyo"
      VIVI_STORYBOOK_SNAPSHOT_SETTLE_MS: "750"
      VIVI_STORYBOOK_SNAPSHOT_MAX_DIFF_RATIO: "0.002"
      VIVI_STORYBOOK_SNAPSHOT_MAX_DIFF_RATIO_OVERRIDES: '{"files-viewer-coverage-states--mermaid-known-viewer":0.1,"files-viewer-coverage-states--viewer-toolbar-sticky-by-extension":0.01,"files-viewer-coverage-states--code-with-local-outline":0.005}'
      VIVI_STORYBOOK_SNAPSHOT_MISMATCH_RETRIES: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run check
      - if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: storybook-snapshot-artifacts
          path: artifacts/storybook-snapshots
          if-no-files-found: ignore

  generated-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false
      - run: go run github.com/99designs/gqlgen generate --config server/graphql/gqlgen.yml
      - run: git diff --exit-code -- server/graphql/generated/generated.go server/graphql/model/models_gen.go server/graphql/schema.resolvers.go

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
