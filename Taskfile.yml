version: "3"

tasks:
  default:
    cmds:
      - task --list

  install:
    desc: Install Node dependencies
    cmds:
      - npm install

  validate:
    desc: Run scaffold validation
    cmds:
      - npm run validate:scaffold

  generate:
    desc: Regenerate generated source files
    cmds:
      - npm run generate:ui-graphql
      - task: generate:graphql

  generate:check:
    desc: Verify committed generated GraphQL source is reproducible
    cmds:
      - task: generate
      - git diff --exit-code -- server/graphql/generated/generated.go server/graphql/model/models_gen.go server/graphql/schema.resolvers.go ui/src/infrastructure/vivi-api/graphql/generated

  security:
    desc: Enforce repository supply-chain policy
    cmds:
      - npm run security:policy

  generate:graphql:
    desc: Regenerate Go GraphQL code from the Vivi schema
    cmds:
      - env GOCACHE="$PWD/.tmp-go-build-cache" GOMODCACHE="$PWD/.tmp-go-mod-cache" go run github.com/99designs/gqlgen generate --config server/graphql/gqlgen.yml

  typecheck:
    desc: Run TypeScript checks
    cmds:
      - npm run typecheck

  dev:
    desc: Start the Vite UI dev server
    cmds:
      - task: ui:dev

  dev:server:
    desc: Start the local TypeScript server harness
    cmds:
      - npm run dev:server

  lint:
    desc: Enforce UI and architecture boundaries
    cmds:
      - npm run lint
      - npm run test:architecture

  ui:test:
    desc: Run UI and browser-facing tests
    cmds:
      - npm test -- test/ui-*.test.ts test/ui-*.test.tsx

  ui:dev:
    desc: Start the Vite UI dev server
    cmds:
      - npm run dev

  ui:build:
    desc: Build the React UI assets
    cmds:
      - npm run prepare:ui-assets
      - npm --prefix ui run build

  ui:storybook:
    desc: Start Storybook for the review UI regression lab
    cmds:
      - npm run storybook

  ui:storybook:build:
    desc: Build Storybook as a verification step
    cmds:
      - npm run build:storybook

  ui:storybook:verify:
    desc: Verify Storybook product-surface coverage and interaction story hooks
    cmds:
      - npm run storybook:verify

  ui:storybook:test:
    desc: Run tagged Storybook interaction stories
    cmds:
      - npm run storybook:test

  storybook:
    desc: Start Storybook for the review UI regression lab
    cmds:
      - task: ui:storybook

  storybook:verify:
    desc: Verify Storybook product-surface coverage and interaction story hooks
    cmds:
      - task: ui:storybook:verify

  storybook:test:
    desc: Run tagged Storybook interaction stories
    cmds:
      - task: ui:storybook:test

  storybook:build:
    desc: Build Storybook as a verification step
    cmds:
      - task: ui:storybook:verify
      - task: ui:storybook:build

  server:test:
    desc: Run Go server and TypeScript server contract tests
    cmds:
      - npm run test:go -- ./server/...
      - npm test -- test/app test/domain test/infra test/e2e

  cli:test:
    desc: Run CLI tests
    cmds:
      - npm run test:go -- ./cli
      - npm test -- test/cli-args.test.ts test/cli-shutdown.test.ts

  go:test:
    desc: Run all Go package tests with repository-local caches
    cmds:
      - npm run test:go

  test:
    desc: Run unit and integration tests
    cmds:
      - npm test

  eval:
    desc: Run fixture-driven evals
    cmds:
      - npm run eval

  e2e:
    desc: Run local server contract tests
    cmds:
      - npm run e2e

  agent-loop:
    desc: Run the fake local agent loop against a running Vivi server
    cmds:
      - npm run harness:agent-loop

  build:
    desc: Build the browser app and local vivi binary
    cmds:
      - npm run build
      - npm run build:go

  check:
    desc: Run the full validation suite
    cmds:
      - npm run check
