version: "3"

vars:
  IMAGE: '{{.IMAGE | default "vivi"}}'
  TAG: '{{.TAG | default "local"}}'
  PORT: '{{.PORT | default "4317"}}'
  ROOT: "{{.ROOT | default .USER_WORKING_DIR}}"
  PLATFORMS: '{{.PLATFORMS | default "linux/amd64,linux/arm64"}}'

tasks:
  default:
    cmds:
      - task --list

  install:
    desc: Install Node dependencies
    cmds:
      - npm install

  validate:
    desc: Run scaffold validation
    cmds:
      - npm run validate:scaffold

  generate:
    desc: Regenerate generated source files
    cmds:
      - task: generate:graphql

  generate:graphql:
    desc: Regenerate Go GraphQL code from the Vivi schema
    cmds:
      - env GOCACHE="$PWD/.tmp-go-build-cache" GOMODCACHE="$PWD/.tmp-go-mod-cache" go run github.com/99designs/gqlgen generate --config server/graphql/gqlgen.yml

  typecheck:
    desc: Run TypeScript checks
    cmds:
      - npm run typecheck

  dev:
    desc: Start the Vite UI dev server
    cmds:
      - task: ui:dev

  dev:server:
    desc: Start the local TypeScript server harness
    cmds:
      - npm run dev:server

  lint:
    desc: Enforce UI and architecture boundaries
    cmds:
      - npm run lint
      - npm run test:architecture

  ui:test:
    desc: Run UI and browser-facing tests
    cmds:
      - npm test -- test/ui-*.test.ts test/ui-*.test.tsx

  ui:dev:
    desc: Start the Vite UI dev server
    cmds:
      - npm run dev

  ui:build:
    desc: Build the React UI assets
    cmds:
      - npm run prepare:ui-assets
      - npm --prefix ui run build

  ui:storybook:
    desc: Start Storybook for presentational UI components
    cmds:
      - npm run storybook

  ui:storybook:build:
    desc: Build Storybook as a verification step
    cmds:
      - npm run build:storybook

  storybook:
    desc: Start Storybook for presentational UI components
    cmds:
      - task: ui:storybook

  storybook:build:
    desc: Build Storybook as a verification step
    cmds:
      - task: ui:storybook:build

  server:test:
    desc: Run Go server and TypeScript server contract tests
    cmds:
      - npm run test:go -- ./server/...
      - npm test -- test/app test/domain test/infra test/e2e

  cli:test:
    desc: Run CLI tests
    cmds:
      - npm run test:go -- ./cli
      - npm test -- test/cli-args.test.ts test/cli-shutdown.test.ts

  go:test:
    desc: Run all Go package tests with repository-local caches
    cmds:
      - npm run test:go

  test:
    desc: Run unit and integration tests
    cmds:
      - npm test

  eval:
    desc: Run fixture-driven evals
    cmds:
      - npm run eval

  e2e:
    desc: Run local server contract tests
    cmds:
      - npm run e2e

  build:
    desc: Build the browser app and local vivi binary
    cmds:
      - npm run build
      - npm run build:go

  check:
    desc: Run the full validation suite
    cmds:
      - npm run check

  docker:build:
    desc: Build the local Docker image
    cmds:
      - docker build -t {{.IMAGE}}:{{.TAG}} .

  docker:buildx:
    desc: Build a multi-architecture Docker image with buildx
    cmds:
      - docker buildx build --platform {{.PLATFORMS}} -t {{.IMAGE}}:{{.TAG}} .

  docker:run:
    desc: Run Vivi from the local Docker image
    cmds:
      - docker run --rm -it -p {{.PORT}}:4317 -v "{{.ROOT}}:/workspace:ro" {{.IMAGE}}:{{.TAG}}

  docker:smoke:
    desc: Build and smoke-test the Docker image help output
    cmds:
      - task: docker:build
      - docker run --rm {{.IMAGE}}:{{.TAG}} --help
